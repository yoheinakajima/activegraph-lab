# GitHub read fixture (ADR-022, rung 1): the read-only tools against canned
# API responses, the allowlist refusal path, MCP passthrough parity with the
# gateway handlers, and the research worker consuming a github.com source
# through tool_gateway. No network; rung 2 (submit_pr) is design-only.

settings:
  crawl_enabled: false
  research_worker_enabled: true
  research_fetch_cap: 4
  dispatch_gap_check: true

mission:
  title: GitHub read mission

branch:
  title: Verify the runtime claim from the repo
  intent: >
    Verify the replay claim using
    https://github.com/yoheinakajima/activegraph-lab/blob/main/README.md
    as a primary source.

# Phase 1 (ADR-022/020): a task directed at a bare repo URL — the lab's own
# proposed "fetch the actual implementation files" branch. The worker fetches
# the (recursive) tree and then the CONTENTS of relevant files, capped.
repo_branch:
  title: Fetch the actual implementation files from the activegraph repo
  intent: >
    Fetch the actual replay and kernel implementation files from
    https://github.com/yoheinakajima/activegraph to verify the replay claim.

expected_outputs:
  allowed_repo: yoheinakajima/activegraph-lab
  refused_repo: somebody-else/private-stuff
  file_text: "# canned README: replay, fork, and diff any run."
  repo: yoheinakajima/activegraph
  repo_fetch_cap: 4   # 1 tree + up to 3 file fetches
