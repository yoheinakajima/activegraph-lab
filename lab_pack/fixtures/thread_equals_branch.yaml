description: |
  Thread = branch (ADR-004): a chat message posted into a thread that
  discusses a branch gets an answer stamped with its event horizon; a second
  message saying "pause this branch" gets both a reply AND the status
  mutation — steering takes effect at event boundaries.

  Also locks the ADR-016 invariant: the answer fires on operator AUTHORITY,
  never on the literal metadata.source tag — operator, operator_via_mcp,
  and any future operator_via_* surface all draw a reply.

mission:
  title: Grow activegraph.ai's evidence base
  target_url: ""

settings:
  crawl_enabled: false
  dispatch_gap_check: false

branch:
  title: Verify the replay claim
  intent: Find evidence that replay rebuilds graph state deterministically.
  status_after_create: active

messages:
  - content: What is this branch doing right now?
    expect_reply: true
    expect_stamp: true        # "— as of event N"
  - content: please pause this branch
    expect_reply: true
    expect_stamp: true
    expect_mutation:
      status: paused          # ADR-007
  - content: ok, resume it
    expect_reply: true
    expect_stamp: true
    expect_mutation:
      status: active
  - content: status check from the operator's own session
    source: operator
    expect_reply: true
    expect_stamp: true
  - content: status check from the operator's assistant over MCP
    source: operator_via_mcp
    expect_reply: true
    expect_stamp: true
  - content: status check from a hypothetical future operator surface
    source: operator_via_email
    expect_reply: true
    expect_stamp: true

expected_outputs:
  response_candidates:
    count: 6
  discusses_relation: true
