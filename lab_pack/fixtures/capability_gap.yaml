description: |
  Emergent dispatch with nobody home (ADR-006): a branch is activated, work
  writes a routed core task, no loaded pack reacts within one event boundary,
  and the lab records the capability gap as an observation — a gap is
  evidence, not an error. And no longer an exit (the branch#64 silent path):
  blocked is an OUTCOME — the gap flows into a task_outcome evaluation,
  interpret fires on it, and a pending promote decision surfaces, so the
  operator hears about work the lab cannot do instead of watching pending
  sit at zero.

mission:
  title: Grow activegraph.ai's evidence base
  target_url: ""

settings:
  crawl_enabled: false
  dispatch_gap_check: true

branch:
  title: Run deep research on the replay claim
  intent: Deep research task that no loaded pack can execute yet.

expected_outputs:
  tasks:
    count: 1
    final_status: blocked
  capability_gap_observations:
    count: 1
    linked_to_branch: true
  task_outcome_evaluations:
    count: 1
    judgment: blocked
  pending_promote_decisions:
    count: 1
